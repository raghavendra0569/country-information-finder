<!DOCTYPE html>
<html>
<head>
    <title>Country Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🌍 Country Finder</h1>

    <input
        type="text"
        id="country"
        placeholder="Enter Country Name"
    >

    <button onclick="getCountry()">
        Search
    </button>

    <button onclick="clearResult()">
        Clear
    </button>

    <button onclick="toggleDarkMode()">
        Dark Mode
    </button>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
